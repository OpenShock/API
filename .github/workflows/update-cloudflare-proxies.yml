name: Update Cloudflare Proxies

on:
  schedule:
    - cron: '0 0 1 * *' # runs at 00:00 UTC on the 1st day of every month
  workflow_dispatch:

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-dotnet@v4

      - name: Build to regenerate Cloudflare IPs
        run: dotnet build Common/Common.csproj

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Common/Utils/CloudflareNetworks.g.cs

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: Update Cloudflare proxy IP lists [auto-generated]"
            git push
          fi
